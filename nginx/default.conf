server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Large upload support ───────────────────────────────────────────────────
    # Covers Excel imports (10k rows) and certificate/document uploads.
    client_max_body_size 100m;

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Forwards all /api/* requests to the api container.
    # proxy_request_buffering off lets large file bodies stream straight through
    # without nginx buffering the entire upload to disk first.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Long timeouts for background import jobs (polled by the frontend)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Don't buffer upload bodies — stream them directly to the API
        proxy_request_buffering off;
    }

    # ── Static assets (hashed filenames) ─────────────────────────────────────
    # Vite appends a content hash to JS/CSS bundles so they can be cached
    # aggressively. Any asset without a hash (e.g. fonts, images in /assets/)
    # also gets a long TTL; Vite will change the filename when content changes.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── HTML entry point ──────────────────────────────────────────────────────
    # Never cache index.html so users always get the latest asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All other paths serve index.html so client-side routing (Wouter) works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
